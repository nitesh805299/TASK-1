<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Petopia Hub</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ==" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="style2.css">
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <a class="auth-brand" href="../index.html"><i class="fa-solid fa-paw"></i> PETOPIA HUB</a>
      <h1>Create account</h1>
      <p class="subtitle">Join Petopia Hub for a better shopping experience.</p>

      <form>
        <label class="field">
          <span>Email</span>
          <i class="fa-solid fa-envelope"></i>
          <input type="email" placeholder="Enter email" required>
        </label>
        <label class="field">
          <span>Password</span>
          <i class="fa-solid fa-lock"></i>
          <input type="password" placeholder="Create password" required>
        </label>
        <button type="submit">Sign Up</button>
        <p class="switch">Already have an account? <a href="../login/login.html">Login</a></p>
      </form>
    </section>
  </main>
</body>
</html>
