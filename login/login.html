<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Petopia Hub</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ==" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="style1.css">
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <a class="auth-brand" href="../index.html"><i class="fa-solid fa-paw"></i> PETOPIA HUB</a>
      <h1>Welcome back</h1>
      <p class="subtitle">Login to continue shopping for your pet.</p>

      <form>
        <label class="field">
          <span>Username</span>
          <i class="fa-solid fa-user"></i>
          <input type="text" placeholder="Enter username" required>
        </label>
        <label class="field">
          <span>Email</span>
          <i class="fa-solid fa-envelope"></i>
          <input type="email" placeholder="Enter email" required>
        </label>
        <label class="field">
          <span>Password</span>
          <i class="fa-solid fa-lock"></i>
          <input type="password" placeholder="Enter password" required>
        </label>

        <div class="form-row">
          <label><input type="checkbox"> Remember me</label>
          <a href="#">Forgot password?</a>
        </div>

        <button type="submit">Login</button>
        <p class="switch">Do not have an account? <a href="../sign-up/index1.html">Register</a></p>
      </form>
    </section>
  </main>
</body>
</html>
